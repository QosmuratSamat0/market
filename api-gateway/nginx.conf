# Resolve through Docker DNS to avoid stale upstream IPs after container restarts
resolver 127.0.0.11 ipv6=off valid=10s;

# Gzip compression
gzip on;
gzip_types text/plain text/css application/json application/javascript;

server {
    listen 80;
    server_name localhost samat.work www.samat.work shop.samat.work api.samat.work *.samat.work;

    # Set backend variables using environment variables
    set $auth_backend http://auth-service:${AUTH_PORT};
    set $user_backend http://user-service:${USER_PORT};
    set $product_backend http://product-service:${PRODUCT_PORT};
    set $order_backend http://order-service:${ORDER_PORT};
    set $payment_backend http://payment-service:${PAYMENT_PORT};
    set $notification_backend http://notification-service:${NOTIFICATION_PORT};

    # SECURITY: Block any external access to internal endpoints
    location ~ /internal/ {
        deny all;
        return 403;
    }

    # Health check endpoint for Prometheus
    location /health {
        access_log off;
        return 200 "OK";
    }

    # Grafana Dashboard
    location /grafana/ {
        proxy_pass http://grafana:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Prometheus Dashboard (optional, for debugging)
    location /prometheus/ {
        proxy_pass http://prometheus:9090/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Auth Service
    location ^~ /auth {
        proxy_pass $auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # User Service
    location ^~ /users {
        proxy_pass $user_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Product Service
    location ^~ /products {
        proxy_pass $product_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Order Service
    location ^~ /orders {
        proxy_pass $order_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Payment Service
    location ^~ /payments {
        proxy_pass $payment_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Notification Service
    location ^~ /notifications/ {
        rewrite ^/notifications/(.*) /$1 break;
        proxy_pass $notification_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
    }
}

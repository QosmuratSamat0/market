# Resolve through Docker DNS
resolver 127.0.0.11 ipv6=off valid=10s;

# Gzip compression
gzip on;
gzip_types text/plain text/css application/json application/javascript;

server {
    listen 80;
    server_name localhost samat.work *.samat.work;

    # Security Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # CORS Headers (Adjust Origin as needed)
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
    add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "OK";
    }

    # Grafana Dashboard (with sub-path support)
    location /grafana/ {
        set $grafana_backend http://grafana:3000;
        proxy_pass $grafana_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
    }

    # Prometheus Dashboard
    location /prometheus/ {
        set $prometheus_backend http://prometheus:9090;
        proxy_pass $prometheus_backend;
        proxy_set_header Host $host;
    }

    # Auth Service
    location ^~ /auth/ {
        set $auth_backend http://auth-service:${AUTH_PORT};
        rewrite ^/auth/(.*) /$1 break;
        proxy_pass $auth_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # User Service
    location ^~ /users/ {
        set $user_backend http://user-service:${USER_PORT};
        rewrite ^/users/(.*) /$1 break;
        proxy_pass $user_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Product Service
    location ^~ /products/ {
        set $product_backend http://product-service:${PRODUCT_PORT};
        rewrite ^/products/(.*) /$1 break;
        proxy_pass $product_backend;
        proxy_set_header Host $host;
    }

    # Order Service
    location ^~ /orders/ {
        set $order_backend http://order-service:${ORDER_PORT};
        rewrite ^/orders/(.*) /$1 break;
        proxy_pass $order_backend;
        proxy_set_header Host $host;
    }

    # Payment Service
    location ^~ /payments/ {
        set $payment_backend http://payment-service:${PAYMENT_PORT};
        rewrite ^/payments/(.*) /$1 break;
        proxy_pass $payment_backend;
        proxy_set_header Host $host;
    }

    # Notification Service
    location ^~ /notifications/ {
        set $notification_backend http://notification-service:${NOTIFICATION_PORT};
        rewrite ^/notifications/(.*) /$1 break;
        proxy_pass $notification_backend;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_http_version 1.1;
        chunked_transfer_encoding off;
        proxy_buffering off;
    }
}

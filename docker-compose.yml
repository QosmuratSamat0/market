services:
  # Auth Service
  auth-service:
    image: ghcr.io/qosmuratsamat0/auth-service:latest
    container_name: auth-service
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@auth-postgres:5432/${AUTH_DB_NAME}?sslmode=disable
      - USER_SERVICE_URL=http://user-service:${USER_PORT:-8081}
      - JWT_SECRET=${JWT_SECRET}
      - HTTP_PORT=${AUTH_PORT:-8080}
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      auth-postgres:
        condition: service_healthy
    networks:
      - market_net

  auth-postgres:
    image: postgres:15-alpine
    container_name: auth-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${AUTH_DB_NAME}
    deploy:
      resources:
        limits:
          memory: 200M
    volumes:
      - auth-pgdata:/var/lib/postgresql/data
      - ./auth-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${AUTH_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - market_net

  # User Service
  user-service:
    image: ghcr.io/qosmuratsamat0/user-service:latest
    container_name: user-service
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@user-postgres:5432/${USER_DB_NAME}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - HTTP_PORT=${USER_PORT:-8081}
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      user-postgres:
        condition: service_healthy
    networks:
      - market_net

  user-postgres:
    image: postgres:15-alpine
    container_name: user-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${USER_DB_NAME}
    deploy:
      resources:
        limits:
          memory: 200M
    volumes:
      - user-pgdata:/var/lib/postgresql/data
      - ./user-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${USER_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - market_net

  # Product Service
  product-service:
    image: ghcr.io/qosmuratsamat0/product-service:latest
    container_name: product-service
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@product-postgres:5432/${PRODUCT_DB_NAME}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - HTTP_PORT=${PRODUCT_PORT:-8082}
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      product-postgres:
        condition: service_healthy
    networks:
      - market_net

  product-postgres:
    image: postgres:15-alpine
    container_name: product-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${PRODUCT_DB_NAME}
    deploy:
      resources:
        limits:
          memory: 200M
    volumes:
      - product-pgdata:/var/lib/postgresql/data
      - ./product-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${PRODUCT_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - market_net

  # Order Service
  order-service:
    image: ghcr.io/qosmuratsamat0/order-service:latest
    container_name: order-service
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@order-postgres:5432/${ORDER_DB_NAME}?sslmode=disable
      - PRODUCT_SERVICE_URL=http://product-service:${PRODUCT_PORT:-8082}
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbitmq:5672/
      - HTTP_PORT=${ORDER_PORT:-8083}
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      order-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - market_net

  order-postgres:
    image: postgres:15-alpine
    container_name: order-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${ORDER_DB_NAME}
    deploy:
      resources:
        limits:
          memory: 200M
    volumes:
      - order-pgdata:/var/lib/postgresql/data
      - ./order-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${ORDER_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - market_net

  # API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      - AUTH_PORT=${AUTH_PORT:-8080}
      - USER_PORT=${USER_PORT:-8081}
      - PRODUCT_PORT=${PRODUCT_PORT:-8082}
      - ORDER_PORT=${ORDER_PORT:-8083}
      - PAYMENT_PORT=${PAYMENT_PORT:-8084}
      - NOTIFICATION_PORT=${NOTIFICATION_PORT:-8085}
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/templates/nginx.conf.template:ro
    deploy:
      resources:
        limits:
          memory: 64M
    networks:
      - market_net

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9095:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - market_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - market_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - market_net

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBIT_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBIT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: rabbitmq-diagnostics -q check_running
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M
    networks:
      - market_net

  # Payment Service
  payment-service:
    image: ghcr.io/qosmuratsamat0/payment-service:latest
    container_name: payment-service
    env_file:
      - ./payment-service/.env
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      payment-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - market_net

  payment-postgres:
    image: postgres:15-alpine
    container_name: payment-postgres
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${PAYMENT_DB_NAME}
    deploy:
      resources:
        limits:
          memory: 200M
    volumes:
      - payment-pgdata:/var/lib/postgresql/data
      - ./payment-service/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${PAYMENT_DB_NAME}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - market_net

  # Notification Service
  notification-service:
    image: ghcr.io/qosmuratsamat0/notification-service:latest
    container_name: notification-service
    environment:
      - RABBITMQ_URL=amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbitmq:5672/
      - HTTP_PORT=${NOTIFICATION_PORT:-8085}
    ports:
      - "${NOTIFICATION_PORT:-8085}:${NOTIFICATION_PORT:-8085}"
    deploy:
      resources:
        limits:
          memory: 128M
    depends_on:
      - rabbitmq
    networks:
      - market_net

networks:
  market_net:
    driver: bridge

volumes:
  auth-pgdata:
  user-pgdata:
  product-pgdata:
  order-pgdata:
  payment-pgdata:

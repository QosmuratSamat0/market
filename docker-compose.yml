services:
  # Shared PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - AUTH_DB_NAME=${AUTH_DB_NAME}
      - USER_DB_NAME=${USER_DB_NAME}
      - PRODUCT_DB_NAME=${PRODUCT_DB_NAME}
      - ORDER_DB_NAME=${ORDER_DB_NAME}
      - PAYMENT_DB_NAME=${PAYMENT_DB_NAME}
    deploy:
      resources:
        limits:
          memory: 150M
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-databases.sh:/docker-entrypoint-initdb.d/init-databases.sh:ro
      - ./auth-service/migrations:/migrations/auth:ro
      - ./user-service/migrations:/migrations/user:ro
      - ./product-service/migrations:/migrations/product:ro
      - ./order-service/migrations:/migrations/order:ro
      - ./payment-service/migrations:/migrations/payment:ro
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - market_net

  # Auth Service
  auth-service:
    build: ./auth-service
    restart: always
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${AUTH_DB_NAME}?sslmode=disable
      - USER_SERVICE_URL=http://user-service:${USER_PORT:-8081}
      - JWT_SECRET=${JWT_SECRET}
      - HTTP_SERVER_ADDRESS=:${AUTH_PORT:-8080}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${AUTH_PORT:-8080}/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - market_net

  # User Service
  user-service:
    build: ./user-service
    restart: always
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${USER_DB_NAME}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - HTTP_SERVER_ADDRESS=:${USER_PORT:-8081}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${USER_PORT:-8081}/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - market_net

  # Product Service
  product-service:
    build: ./product-service
    restart: always
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${PRODUCT_DB_NAME}?sslmode=disable
      - JWT_SECRET=${JWT_SECRET}
      - HTTP_SERVER_ADDRESS=:${PRODUCT_PORT:-8082}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${PRODUCT_PORT:-8082}/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - market_net

  # Order Service
  order-service:
    build: ./order-service
    restart: always
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${ORDER_DB_NAME}?sslmode=disable
      - PRODUCT_SERVICE_URL=http://product-service:${PRODUCT_PORT:-8082}
      - JWT_SECRET=${JWT_SECRET}
      - RABBITMQ_URL=amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbitmq:5672/
      - HTTP_SERVER_ADDRESS=:${ORDER_PORT:-8083}
    deploy:
      replicas: 3
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${ORDER_PORT:-8083}/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - market_net

  # Payment Service
  payment-service:
    build: ./payment-service
    restart: always
    environment:
      - DATABASE_URL=postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${PAYMENT_DB_NAME}?sslmode=disable
      - HTTP_SERVER_ADDRESS=:${PAYMENT_PORT:-8084}
      - ORDER_SERVICE_URL=http://order-service:${ORDER_PORT:-8083}
      - USER_SERVICE_URL=http://user-service:${USER_PORT:-8081}
      - RABBITMQ_URL=amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbitmq:5672/
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${PAYMENT_PORT:-8084}/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    depends_on:
      user-service:
        condition: service_healthy
      order-service:
        condition: service_healthy
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - market_net

  # Notification Service
  notification-service:
    build: ./notification-service
    restart: always
    environment:
      - RABBITMQ_URL=amqp://${RABBIT_USER:-guest}:${RABBIT_PASS:-guest}@rabbitmq:5672/
      - HTTP_SERVER_ADDRESS=:${NOTIFICATION_PORT:-8085}

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${NOTIFICATION_PORT:-8085}/health" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - market_net

  # API Gateway
  api-gateway:
    image: nginx:alpine
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    environment:
      - AUTH_PORT=${AUTH_PORT:-8080}
      - USER_PORT=${USER_PORT:-8081}
      - PRODUCT_PORT=${PRODUCT_PORT:-8082}
      - ORDER_PORT=${ORDER_PORT:-8083}
      - PAYMENT_PORT=${PAYMENT_PORT:-8084}
      - NOTIFICATION_PORT=${NOTIFICATION_PORT:-8085}
    volumes:
      - ./api-gateway/nginx.conf:/etc/nginx/templates/default.conf.template:ro
    healthcheck:
      test: [ "CMD-SHELL", "nc -z localhost 80 || exit 1" ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 120s
    networks:
      - market_net

  # Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped

    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.external-url=http://localhost/prometheus/'
      - '--web.route-prefix=/prometheus/'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert.rules:/etc/prometheus/alert.rules:ro
    networks:
      - market_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped

    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_DATABASE_TYPE=postgres
      - GF_DATABASE_HOST=postgres:5432
      - GF_DATABASE_NAME=grafana
      - GF_DATABASE_USER=${DB_USER}
      - GF_DATABASE_PASSWORD=${DB_PASSWORD}
    networks:
      - market_net

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($|/)'
    deploy:
      resources:
        limits:
          memory: 32M
    networks:
      - market_net

  # RabbitMQ
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBIT_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBIT_PASS:-guest}

    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "check_port_connectivity" ]
      interval: 5s
      timeout: 10s
      retries: 20
      start_period: 400s
    deploy:
      resources:
        limits:
          memory: 200M
    networks:
      - market_net

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    networks:
      - market_net

networks:
  market_net:
    driver: bridge

volumes:
  pgdata:

apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: market
  labels:
    app: api-gateway
data:
  nginx.conf: |
    user  nginx;
    worker_processes  auto;
    events { worker_connections  1024; }
    http {
        include       /etc/nginx/mime.types;
        default_type  application/octet-stream;
        sendfile        on;
        resolver kube-dns.kube-system.svc.cluster.local valid=10s;

        server {
            listen 80;

            location /health {
                access_log off;
                return 200 'OK';
            }

            # Grafana
            location /grafana/ {
                proxy_pass http://grafana:3000;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 5s;
                proxy_read_timeout 60s;
            }

            # Prometheus
            location /prometheus/ {
                proxy_pass http://prometheus:9090/prometheus/;
                proxy_set_header Host $host;
            }

            # Auth Service
            location /auth/ {
                proxy_pass http://auth-service:8080/;
            }

            # User Service
            location /users/ {
                proxy_pass http://user-service:8081/;
            }

            # Product Service
            location /products/ {
                proxy_pass http://product-service:8082/;
            }

            # Order Service
            location /orders/ {
                proxy_pass http://order-service:8083/;
            }

            # Payment Service
            location /payments/ {
                proxy_pass http://payment-service:8084/;
            }

            # Notification Service
            location /notifications/ {
                proxy_pass http://notification-service:8085/;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
            }
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: market
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
          volumeMounts:
            - name: config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
      volumes:
        - name: config
          configMap:
            name: nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: market
spec:
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  selector:
    app: api-gateway

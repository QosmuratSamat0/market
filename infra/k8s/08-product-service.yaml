apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: market
spec:
  replicas: 2
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: ghcr.io/qosmuratsamat0/product-service:latest
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: DB_PASS
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASS)@postgres:5432/product_db?sslmode=disable"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: JWT_SECRET
            - name: HTTP_SERVER_ADDRESS
              value: ":8082"
          ports:
            - containerPort: 8082
          readinessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8082
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: market
spec:
  ports:
    - port: 8082
  selector:
    app: product-service

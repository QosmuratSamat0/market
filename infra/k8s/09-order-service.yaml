apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: market
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
        - name: order-service
          image: ghcr.io/qosmuratsamat0/order-service:latest
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: DB_PASS
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASS)@postgres:5432/order_db?sslmode=disable"
            - name: PRODUCT_SERVICE_URL
              value: "http://product-service:8082"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: JWT_SECRET
            - name: RABBITMQ_USER
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: RABBITMQ_USER
            - name: RABBITMQ_PASS
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: RABBITMQ_PASS
            - name: RABBITMQ_URL
              value: "amqp://$(RABBITMQ_USER):$(RABBITMQ_PASS)@rabbitmq:5672/"
            - name: HTTP_SERVER_ADDRESS
              value: ":8083"
          ports:
            - containerPort: 8083
          readinessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8083
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: market
spec:
  ports:
    - port: 8083
  selector:
    app: order-service

apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: market
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      containers:
        - name: payment-service
          image: ghcr.io/qosmuratsamat0/payment-service:latest
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: DB_PASS
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASS)@postgres:5432/payment_db?sslmode=disable"
            - name: ORDER_SERVICE_URL
              value: "http://order-service:8083"
            - name: USER_SERVICE_URL
              value: "http://user-service:8081"
            - name: RABBITMQ_URL
              value: "amqp://guest:guest@rabbitmq:5672/"
            - name: HTTP_SERVER_ADDRESS
              value: ":8084"
          ports:
            - containerPort: 8084
          readinessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8084
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: market
spec:
  ports:
    - port: 8084
  selector:
    app: payment-service

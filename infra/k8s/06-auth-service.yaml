apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: market
spec:
  replicas: 2
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      containers:
        - name: auth-service
          image: ghcr.io/qosmuratsamat0/auth-service:latest
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: DB_USER
            - name: DB_PASS
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: DB_PASS
            - name: DATABASE_URL
              value: "postgres://$(DB_USER):$(DB_PASS)@postgres:5432/auth_db?sslmode=disable"
            - name: USER_SERVICE_URL
              value: "http://user-service:8081"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: market-secret
                  key: JWT_SECRET
            - name: HTTP_SERVER_ADDRESS
              value: ":8080"
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: market
spec:
  ports:
    - port: 8080
  selector:
    app: auth-service

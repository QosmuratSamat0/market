name: CI/CD Microservices Pro

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: qosmuratsamat0
  PROJECT_ROOT: /home/yc-user/market-place
  DEPLOY_MODE: swarm

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [auth-service, user-service, product-service, order-service, payment-service, notification-service]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare target directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: mkdir -p ${{ env.PROJECT_ROOT }}

      - name: Copy configs via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "docker-compose.yml,api-gateway/nginx.conf,monitoring/prometheus/,scripts/,infra/,auth-service/migrations/,user-service/migrations/,product-service/migrations/,order-service/migrations/,payment-service/migrations/"
          target: ${{ env.PROJECT_ROOT }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_ROOT }}

            # Create environment variables file
            cat <<EOF > .env
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_USER=${{ secrets.DB_USER }}
            REGISTRY=${{ env.REGISTRY }}
            IMAGE_OWNER=${{ env.IMAGE_OWNER }}
            AUTH_DB_NAME=auth_db
            USER_DB_NAME=user_db
            PRODUCT_DB_NAME=product_db
            ORDER_DB_NAME=order_db
            PAYMENT_DB_NAME=payment_db
            EOF

            # Wait for cloud-init if necessary
            cloud-init status --wait || true

            # Login to GHCR (required for pull/deploy)
            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Execute the orchestration script
            sudo bash infra/setup.sh ${{ env.DEPLOY_MODE }}

            # Cleanup
            sudo docker image prune -f

  sre-stress-test:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Resilience Tests (Ansible)
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY_PATH: private_key.pem
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ansible-playbook -i ansible/inventory.ini ansible/stress_test.yml \
            --private-key private_key.pem \
            -u ${{ secrets.SSH_USER }}
          rm private_key.pem
name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  # Replace with your lowercase repository path if needed
  IMAGE_OWNER: qosmuratsamat0

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - service: auth-service
            context: ./auth-service
          - service: user-service
            context: ./user-service
          - service: product-service
            context: ./product-service
          - service: order-service
            context: ./order-service
          - service: payment-service
            context: ./payment-service
          - service: notification-service
            context: ./notification-service
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/market
            git pull origin main
            
            # Создаем общий .env файл для Docker Compose
            echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" > .env
            echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "GRAFANA_PASSWORD=${{ secrets.GRAFANA_PASSWORD }}" >> .env
            echo "HTTP_PORT=${{ secrets.HTTP_PORT }}" >> .env
            echo "DB_USER=${{ secrets.DB_USER }}" >> .env
            echo "AUTH_DB_NAME=${{ secrets.AUTH_DB_NAME }}" >> .env
            echo "USER_DB_NAME=${{ secrets.USER_DB_NAME }}" >> .env
            echo "PRODUCT_DB_NAME=${{ secrets.PRODUCT_DB_NAME }}" >> .env
            echo "ORDER_DB_NAME=${{ secrets.ORDER_DB_NAME }}" >> .env
            echo "PAYMENT_DB_NAME=${{ secrets.PAYMENT_DB_NAME }}" >> .env
            echo "RABBIT_USER=${{ secrets.RABBIT_USER }}" >> .env
            echo "RABBIT_PASS=${{ secrets.RABBIT_PASS }}" >> .env
            echo "AUTH_PORT=${{ secrets.AUTH_PORT }}" >> .env
            echo "USER_PORT=${{ secrets.USER_PORT }}" >> .env
            echo "PRODUCT_PORT=${{ secrets.PRODUCT_PORT }}" >> .env
            echo "ORDER_PORT=${{ secrets.ORDER_PORT }}" >> .env
            echo "PAYMENT_PORT=${{ secrets.PAYMENT_PORT }}" >> .env
            echo "NOTIFICATION_PORT=${{ secrets.NOTIFICATION_PORT }}" >> .env
            
            # Создаем .env файл для payment-service
            echo "${{ secrets.PAYMENT_SERVICE_ENV }}" > ./payment-service/.env
            
            # Валидация конфигурации
            chmod +x ./scripts/validate_config.sh
            source .env && ./scripts/validate_config.sh
            
            # Логинимся в GHCR на сервере (используем PAT, т.к. GITHUB_TOKEN не работает вне CI)
            if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
              echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            else
              echo "WARNING: GHCR_TOKEN not set, pulling without auth (packages must be public)"
            fi
            
            # Скачиваем новые образы и перезапускаем
            sudo docker compose pull
            sudo docker compose up -d --force-recreate --remove-orphans
            
            # Ждём, чтобы контейнеры запустились
            sleep 10
            
            # Проверяем статус контейнеров
            sudo docker ps --format 'table {{.Names}}\t{{.Status}}\t{{.Image}}'
            
            # Cleanup old unused images to save disk space
            sudo docker image prune -f
          debug: true

  sre-testing:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run SRE Capacity & Resilience Test
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ANSIBLE_HOST_KEY_CHECKING: 'False'
        run: |
          # 1. Подготовка ключа
          echo "$SSH_KEY" > private_key.pem
          chmod 600 private_key.pem
          
          # 2. Указываем путь к ключу для Ansible через переменную окружения
          export SSH_KEY_PATH=$(pwd)/private_key.pem
          
          # 3. Запуск теста
          ansible-playbook -i ansible/inventory.ini ansible/stress_test.yml
          
          # 4. Удаление ключа
          rm private_key.pem

name: CI/CD Microservices Pro

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: qosmuratsamat0
  PROJECT_ROOT: /home/yc-user/market-place

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [auth-service, user-service, product-service, order-service, payment-service, notification-service]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ matrix.service }}:${{ github.sha }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare target directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: mkdir -p ${{ env.PROJECT_ROOT }}

      - name: Copy configs via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          # Копируем только необходимые файлы для запуска
          source: "docker-compose.yml,api-gateway/nginx.conf,monitoring/prometheus/,scripts/,auth-service/migrations/,user-service/migrations/,product-service/migrations/,order-service/migrations/,payment-service/migrations/"
          target: ${{ env.PROJECT_ROOT }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd ${{ env.PROJECT_ROOT }}

            # Генерируем общий .env файл
            cat <<EOF > .env
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            DB_USER=${{ secrets.DB_USER }}
            REGISTRY=${{ env.REGISTRY }}
            IMAGE_OWNER=${{ env.IMAGE_OWNER }}
            AUTH_DB_NAME=auth_db
            USER_DB_NAME=user_db
            PRODUCT_DB_NAME=product_db
            ORDER_DB_NAME=order_db
            PAYMENT_DB_NAME=payment_db
            EOF

            # Ожидаем завершения установки Docker (cloud-init)
            echo "Waiting for cloud-init to finish..."
            cloud-init status --wait || true

            # Fallback: Если cloud-init упал и Docker не установился, ставим его вручную
            if ! command -v docker &> /dev/null; then
              echo "Docker not found! Cloud-init might have failed. Installing manually..."
              sudo DEBIAN_FRONTEND=noninteractive apt-get update
              sudo DEBIAN_FRONTEND=noninteractive apt-get install -y docker.io docker-compose-v2
              sudo systemctl enable --now docker
              sudo usermod -aG docker $USER || true
            fi

            # Логин в реестр на сервере
            echo "${{ secrets.GHCR_TOKEN }}" | sudo docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # SRE-оптимизация: скачиваем новые образы до остановки старых (минимум downtime)
            sudo docker compose pull

            # Перезапуск сервисов
            sudo docker compose up -d --remove-orphans

            # Healthcheck: ждем 30 секунд и проверяем статус
            echo "Waiting for healthchecks..."
            sleep 30
            UNHEALTHY=$(sudo docker ps --filter "health=unhealthy" -q)
            if [ -n "$UNHEALTHY" ]; then
              echo "Error: Some containers are unhealthy!"
              sudo docker ps -a
              exit 1
            fi

            # Очистка старых неиспользуемых образов (SRE: сохраняем место на диске)
            sudo docker image prune -f

  sre-stress-test:
    if: false
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Resilience Tests (Ansible)
        env:
          ANSIBLE_HOST_KEY_CHECKING: 'False'
        run: |
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem
          ansible-playbook -i ansible/inventory.ini ansible/stress_test.yml \
            --private-key private_key.pem \
            -u ${{ secrets.SSH_USER }}
          rm private_key.pem
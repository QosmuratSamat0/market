---
- name: Advanced SRE Capacity Analysis and Self-Healing Test
  hosts: all
  become: yes
  vars:
    target_url: "http://localhost"
    load_levels:
      - { name: "low", reqs: 500, conc: 20 }
      - { name: "medium", reqs: 2000, conc: 50 }
      - { name: "heavy", reqs: 10000, conc: 150 }

  tasks:
    - name: 1. Preparation - Install Apache Utils (ab)
      package:
        name: apache2-utils
        state: present

    - name: 2. Capacity Planning - Multi-level Stress Test on Order Service
      shell: "ab -n {{ item.reqs }} -c {{ item.conc }} -s 120 {{ target_url }}/orders/health"
      register: load_results
      loop: "{{ load_levels }}"
      failed_when: false
      loop_control:
        label: "Testing level: {{ item.name }} ({{ item.reqs }} reqs, {{ item.conc }} conc)"

    - name: 3. Save Load Results to Files
      copy:
        content: "{{ item.stdout if item.rc == 0 else item.stderr }}"
        dest: "/tmp/capacity_report_{{ item.item.name }}.txt"
      loop: "{{ load_results.results }}"
      loop_control:
        label: "Saving results for {{ item.item.name }}"

    - name: 4. Display Analysis Summary
      debug:
        msg: 
          - "--- CAPACITY ANALYSIS REPORT ---"
          - "Level: {{ item.item.name }}"
          - "Requests/sec: {{ item.stdout | regex_search('Requests per second:.*') | default('FAILED') }}"
          - "Time per req: {{ item.stdout | regex_search('Time per request:.*') | default('FAILED') }}"
          - "Failed reqs: {{ item.stdout | regex_search('Failed requests:.*') | default('0') }}"
          - "Error Details: {{ item.stderr if item.rc != 0 else 'None' }}"
      loop: "{{ load_results.results }}"
      loop_control:
        label: "Reporting for {{ item.item.name }}"

    - name: 5. Automation Test - Kill one Order Service instance (Self-Healing)
      shell: "docker exec order-service kill 1"
      register: kill_result
      failed_when: false

    - name: 6. Wait for Self-Healing (restart policy)
      pause:
        seconds: 90

    - name: 7. Verify Container Recovery
      shell: docker ps -a --filter "name=order-service" --format "{{ '{{' }}.Status{{ '}}' }}"
      register: container_status

    - name: 8. Report Recovery Status
      debug:
        msg:
          - "--- SELF-HEALING TEST ---"
          - "Action: Killed 'order-service'"
          - "Wait: 10 seconds"
          - "Current Status: {{ container_status.stdout }}"
          - "Verdict: {{ 'SUCCESS - Service Recovered' if 'Up' in container_status.stdout else 'FAILURE - Service Down' }}"

    - name: 9. Final Instructions
      debug:
        msg: "Full reports saved to /tmp/capacity_report_*.txt on the server. Analyze Grafana during the test times for CPU/Memory correlations."
